<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Recording Notes</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="AI Notes" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 64 64" fill="none">
              <rect width="64" height="64" rx="14" fill="#0d0d0f"/>
              <rect x="12" y="10" width="34" height="42" rx="4" fill="#1a1a2e" stroke="#6366f1" stroke-width="1.5"/>
              <rect x="10" y="10" width="6" height="42" rx="3" fill="#0d0d0f" stroke="#4a4a6e" stroke-width="1"/>
              <circle cx="13" cy="18" r="2" fill="#6366f1" opacity="0.8"/>
              <circle cx="13" cy="26" r="2" fill="#6366f1" opacity="0.8"/>
              <circle cx="13" cy="34" r="2" fill="#6366f1" opacity="0.8"/>
              <circle cx="13" cy="42" r="2" fill="#6366f1" opacity="0.8"/>
              <line x1="22" y1="22" x2="40" y2="22" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
              <line x1="22" y1="28" x2="38" y2="28" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
              <line x1="22" y1="34" x2="36" y2="34" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
              <line x1="22" y1="44" x2="30" y2="44" stroke="#06b6d4" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="30" y1="44" x2="30" y2="40" stroke="#06b6d4" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="30" y1="40" x2="36" y2="40" stroke="#06b6d4" stroke-width="1.2" stroke-linecap="round"/>
              <circle cx="30" cy="44" r="1.5" fill="#06b6d4"/>
              <circle cx="30" cy="40" r="1.5" fill="#06b6d4"/>
              <circle cx="36" cy="40" r="4" fill="#6366f1" opacity="0.2"/>
              <circle cx="36" cy="40" r="2" fill="#6366f1"/>
            </svg>
          </span>
          <h1>AI Recording Notes</h1>
        </div>
        <div class="header-right">
          <span id="syncStatus" class="sync-status" title="동기화 상태"></span>
          <button id="settingsBtn" class="btn-icon" title="GitHub Gist 설정">⚙️</button>
        </div>
      </div>
      <p class="subtitle">Claude Code & Antigravity & Gemini CLI</p>
    </header>

    <main class="main">
      <!-- 입력 폼 -->
      <section class="form-section glass">
        <h2 class="section-title">새 기록 추가</h2>
        <form id="noteForm" class="note-form">
          <div class="form-row">
            <input
              type="text"
              id="noteTitle"
              class="input"
              placeholder="제목을 입력하세요"
              required
            />
            <select id="noteTool" class="select">
              <option value="claude">Claude Code</option>
              <option value="antigravity">Antigravity</option>
              <option value="gemini">Gemini CLI</option>
            </select>
            <select id="noteTag" class="select">
              <option value="팁">팁</option>
              <option value="트러블슈팅">트러블슈팅</option>
              <option value="레퍼런스">레퍼런스</option>
            </select>
          </div>
          <textarea
            id="noteContent"
            class="textarea"
            placeholder="내용을 입력하세요"
            rows="4"
            required
          ></textarea>
          <button type="submit" class="btn btn-primary">💾 저장하기</button>
        </form>
      </section>

      <!-- 탭 필터 -->
      <nav class="tab-nav">
        <button class="tab active" data-filter="all">🗂️ 전체</button>
        <button class="tab" data-filter="claude">🟣 Claude Code</button>
        <button class="tab" data-filter="antigravity">🔵 Antigravity</button>
        <button class="tab" data-filter="gemini">🟢 Gemini CLI</button>
      </nav>

      <!-- 카드 목록 -->
      <section id="noteList" class="note-list"></section>

      <!-- 빈 상태 -->
      <div id="emptyState" class="empty-state hidden">
        <span class="empty-icon"></span>
        <p>아직 기록이 없습니다.<br />위에서 첫 번째 노트를 추가해 보세요.</p>
      </div>
    </main>
  </div>

  <!-- 설정 모달 -->
  <div id="settingsModal" class="modal-overlay hidden">
    <div class="modal glass">
      <div class="modal-header">
        <h3>⚙️ GitHub Gist 동기화 설정</h3>
        <button id="modalClose" class="btn-icon">✕</button>
      </div>
      <div class="modal-body">
        <p class="modal-desc">
          GitHub Personal Access Token을 입력하면<br />
          모든 기기에서 노트가 자동으로 동기화됩니다.
        </p>
        <label class="form-label">GitHub Token
          <a href="https://github.com/settings/tokens/new?scopes=gist&description=AI+Recording+Notes"
             target="_blank" class="link">발급받기 →</a>
        </label>
        <input type="password" id="tokenInput" class="input" placeholder="ghp_xxxxxxxxxxxx" />
        <p class="modal-hint">범위(Scope): <code>gist</code> 만 체크하면 됩니다.</p>

        <label class="form-label" style="margin-top:14px">Gist ID <span class="text-muted">(자동 생성, 직접 입력 가능)</span></label>
        <input type="text" id="gistIdInput" class="input" placeholder="기존 Gist ID (선택사항)" />
      </div>
      <div class="modal-footer">
        <button id="saveSettingsBtn" class="btn btn-primary">저장 및 동기화</button>
        <button id="clearSettingsBtn" class="btn btn-ghost">연결 해제</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/Record/sw.js');
    }
  </script>
</body>
</html>
