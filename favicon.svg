<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 배경 원 -->
  <circle cx="32" cy="32" r="32" fill="#0d0d0f"/>

  <!-- 보라 글로우 링 -->
  <circle cx="32" cy="32" r="28" stroke="#6366f1" stroke-width="2" opacity="0.4"/>

  <!-- 번개 볼트 (Claude 상징) -->
  <path d="M36 10 L22 34 H31 L28 54 L44 28 H34 Z"
        fill="#6366f1"
        stroke="#818cf8"
        stroke-width="1"
        stroke-linejoin="round"/>

  <!-- 글로우 효과 -->
  <path d="M36 10 L22 34 H31 L28 54 L44 28 H34 Z"
        fill="url(#glow)"
        opacity="0.3"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
